name: Query Regression

on:
  workflow_dispatch:
    inputs:
      case:
        description: Query perf case path in candidate checkout
        required: true
        default: tests/perf/query_cases/promql_pushdown_7913/case.toml
      base_ref:
        description: Base ref/sha to build
        required: true
        default: main
      candidate_ref:
        description: Candidate ref/sha to build (empty = current ref)
        required: false
        default: ""
      allow_large_fixture:
        description: Pass --allow-large-fixture to runner
        type: boolean
        default: true
      http_timeout:
        description: Runner HTTP timeout seconds
        required: true
        default: "300"
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  query-regression:
    if: ${{ github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'query-regression') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout base source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.base_ref }}
          path: base-src
          persist-credentials: false

      - name: Checkout candidate source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || inputs.candidate_ref || github.ref }}
          path: candidate-src
          persist-credentials: false

      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: astral-sh/setup-uv@v5

      - name: Rust cache (base)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: base-src
          shared-key: query-regression-base
          cache-all-crates: "true"
          save-if: false

      - name: Rust cache (candidate)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: candidate-src
          shared-key: query-regression-candidate
          cache-all-crates: "true"
          save-if: false

      - name: Build base greptime
        working-directory: base-src
        run: cargo build -p cmd --bin greptime

      - name: Build candidate greptime and fixture generator
        working-directory: candidate-src
        run: cargo build -p cmd --bin greptime --bin query_perf_fixture

      - name: Run query regression
        id: run
        shell: bash
        env:
          CASE_PATH: ${{ github.event_name == 'pull_request' && 'tests/perf/query_cases/promql_pushdown_7913/case.toml' || inputs.case }}
          HTTP_TIMEOUT: ${{ github.event_name == 'pull_request' && '300' || inputs.http_timeout }}
          ALLOW_LARGE_FIXTURE: ${{ github.event_name == 'pull_request' && 'true' || inputs.allow_large_fixture }}
        run: |
          set +e
          EXTRA_ARGS=()
          if [[ "${ALLOW_LARGE_FIXTURE}" == "true" ]]; then
            EXTRA_ARGS+=(--allow-large-fixture)
          fi
          uv run --no-project python candidate-src/tests/perf/query_regression_runner.py \
            --case "candidate-src/${CASE_PATH}" \
            --base-bin base-src/target/debug/greptime \
            --candidate-bin candidate-src/target/debug/greptime \
            --fixture-generator candidate-src/target/debug/query_perf_fixture \
            --work-dir query-regression-work \
            --http-timeout "${HTTP_TIMEOUT}" \
            "${EXTRA_ARGS[@]}"
          STATUS=$?
          echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Generate Markdown summary
        if: always()
        shell: bash
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CASE_NAME: ${{ github.event_name == 'pull_request' && 'promql_pushdown_7913' || inputs.case }}
          BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.base_ref }}
          CANDIDATE_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/merge', github.event.pull_request.number) || inputs.candidate_ref || github.ref }}
        run: |
          uv run --no-project python candidate-src/.github/scripts/query-regression-summary.py \
            --report query-regression-work/query-regression-report.json \
            --run-url "${RUN_URL}" \
            --case-name "${CASE_NAME}" \
            --base-ref "${BASE_REF}" \
            --candidate-ref "${CANDIDATE_REF}" \
            --output query-regression-summary.md
          cat query-regression-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Write PR metadata for trusted comment workflow
        if: ${{ always() && github.event_name == 'pull_request' }}
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          python3 - <<'PY'
          import json
          import os

          metadata = {
              "pr_number": int(os.environ["PR_NUMBER"]),
              "head_sha": os.environ["HEAD_SHA"],
              "head_repo": os.environ["HEAD_REPO"],
              "base_repo": os.environ["BASE_REPO"],
              "run_id": int(os.environ["RUN_ID"]),
              "run_attempt": int(os.environ["RUN_ATTEMPT"]),
          }
          with open("query-regression-pr.json", "w", encoding="utf-8") as fp:
              json.dump(metadata, fp, sort_keys=True)
              fp.write("\n")
          PY

      - name: Upload query regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: query-regression-report
          path: |
            query-regression-work/**
            query-regression-summary.md
          if-no-files-found: warn

      - name: Upload trusted comment artifact
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v4
        with:
          name: query-regression-comment
          path: |
            query-regression-pr.json
            query-regression-summary.md
          if-no-files-found: warn
          retention-days: 7

      - name: Fail on regression failure
        if: ${{ steps.run.outputs.status != '0' }}
        run: exit 1
