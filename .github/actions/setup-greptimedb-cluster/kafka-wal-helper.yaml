apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-wal-helper
  labels:
    app: kafka-wal-helper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-wal-helper
  template:
    metadata:
      labels:
        app: kafka-wal-helper
    spec:
      containers:
        - name: kafka-wal-helper
          image: localhost:5001/greptime/kafka-wal-helper:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--addr"
            - "0.0.0.0:8080"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-wal-helper
  labels:
    app: kafka-wal-helper
spec:
  type: ClusterIP
  selector:
    app: kafka-wal-helper
  ports:
    - name: http
      port: 8080
      targetPort: http
