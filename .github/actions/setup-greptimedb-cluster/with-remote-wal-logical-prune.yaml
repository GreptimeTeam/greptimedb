logging:
  level: "info"
  format: "json"
  filters:
  - log_store=debug
meta:
  configData: |-
    [runtime]
    global_rt_size = 4

    [wal]
    provider = "kafka"
    broker_endpoints = ["kafka.kafka-cluster.svc.cluster.local:9092"]
    num_topics = 3
    auto_prune_interval = "30s"
    auto_prune_parallelism = 3
    auto_prune_logical_delete = true
    trigger_flush_threshold = 100
    region_flush_trigger_interval = "30s"
    periodic_checkpoint_persist_interval = "60s"
    flush_trigger_size = "1MB"
    checkpoint_trigger_size = "1MB"

    [datanode]
    [datanode.client]
    timeout = "120s"
datanode:
  configData: |-
    [runtime]
    global_rt_size = 4
    compact_rt_size = 2

    [wal]
    provider = "kafka"
    broker_endpoints = ["kafka.kafka-cluster.svc.cluster.local:9092"]
    num_topics = 3
    topic_latest_offset_fetch_interval = "30s"
    overwrite_entry_start_id = false

    [[region_engine]]
    [region_engine.mito]
    auto_flush_interval = "30s"
frontend:
  configData: |-
    [runtime]
    global_rt_size = 4

    [meta_client]
    ddl_timeout = "120s"
objectStorage:
  s3:
    bucket: default
    region: us-west-2
    root: test-root
    endpoint: http://minio.minio.svc.cluster.local
  credentials:
    accessKeyId: rootuser
    secretAccessKey: rootpass123
remoteWal:
   enabled: true
   kafka:
     brokerEndpoints:
      - "kafka.kafka-cluster.svc.cluster.local:9092"
