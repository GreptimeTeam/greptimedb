githubConfigUrl: "https://github.com/GreptimeTeam/greptimedb"
githubConfigSecret: greptimedb-arc-github-app

runnerScaleSetName: "perf-regression-8-cores"
minRunners: 0
maxRunners: 1

template:
  spec:
    automountServiceAccountToken: false
    activeDeadlineSeconds: 12600
    nodeSelector:
      kubernetes.io/hostname: minipc-3
    securityContext:
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      fsGroup: 1001
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    volumes:
      - name: build-cache
        persistentVolumeClaim:
          claimName: query-regression-build-cache
    initContainers:
      - name: initialize-build-cache
        image: greptime-registry.cn-hangzhou.cr.aliyuncs.com/greptime/greptimedb-query-regression-runner@sha256:c6a171ea47e44c001109833d67ff947b04e9e2b879ec222e4c07a9987158ee4c
        imagePullPolicy: Always
        command:
          - /bin/sh
          - -ec
          - |
            umask 0002
            for directory in cargo-home-v1 rustup-home-v1 query-regression-target-v1 meta-v1 sccache-v1; do
              cache_directory="/cache/${directory}"
              mkdir -p "${cache_directory}"
              test -w "${cache_directory}"
              probe_file="${cache_directory}/.write-probe"
              : > "${probe_file}"
              test -f "${probe_file}"
              rm "${probe_file}"
            done
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
            ephemeral-storage: 1Gi
          limits:
            cpu: 500m
            memory: 512Mi
            ephemeral-storage: 1Gi
        volumeMounts:
          - name: build-cache
            mountPath: /cache
    containers:
      - name: runner
        image: greptime-registry.cn-hangzhou.cr.aliyuncs.com/greptime/greptimedb-query-regression-runner@sha256:c6a171ea47e44c001109833d67ff947b04e9e2b879ec222e4c07a9987158ee4c
        imagePullPolicy: Always
        command: ["/home/runner/run.sh"]
        env:
          - name: CARGO_HOME
            value: /home/runner/.cargo
          - name: RUSTUP_HOME
            value: /home/runner/.rustup
          - name: CARGO_TARGET_DIR
            value: /home/runner/query-regression-target
          - name: QUERY_REGRESSION_CACHE_META
            value: /home/runner/query-regression-cache-meta
          - name: RUSTC_WRAPPER
            value: /usr/local/bin/sccache
          - name: SCCACHE_DIR
            value: /home/runner/.cache/sccache
          - name: SCCACHE_CACHE_SIZE
            value: 40G
          - name: CARGO_INCREMENTAL
            value: "0"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          runAsGroup: 1001
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: "8"
            memory: 24Gi
            ephemeral-storage: 80Gi
          limits:
            cpu: "8"
            memory: 24Gi
            ephemeral-storage: 80Gi
        volumeMounts:
          - name: build-cache
            mountPath: /home/runner/.cargo
            subPath: cargo-home-v1
          - name: build-cache
            mountPath: /home/runner/.rustup
            subPath: rustup-home-v1
          - name: build-cache
            mountPath: /home/runner/query-regression-target
            subPath: query-regression-target-v1
          - name: build-cache
            mountPath: /home/runner/query-regression-cache-meta
            subPath: meta-v1
          - name: build-cache
            mountPath: /home/runner/.cache/sccache
            subPath: sccache-v1
