[case]
name = "prom_remote_write_smoke"
description = "Moderate Prometheus remote-write storage/read-bench case with multiple flushed SSTs"

[scenario]
kind = "prom_remote_write_then_query"

[scenario.remote_write]
database = "public"
metric = "prom_remote_write_smoke"
physical_table = "greptime_physical_table"
series_count = 512
samples_per_series = 1440
sample_chunk_size = 480
flush_every_sample_chunks = 1
start_unix_millis = 1_704_067_200_000
step_millis = 60_000
chunk_series_count = 128
timeout_seconds = 180
visibility_timeout_seconds = 120

[scenario.remote_write.prom_store]
pending_rows_flush_interval = "1s"
max_batch_rows = 100000

[scenario.remote_write.storage]
column = "greptime_value"
min_files = 2
min_files_with_column = 2

[[scenario.queries]]
name = "selector_1d_storage_smoke"
kind = "tql"
query = "TQL ANALYZE VERBOSE (1704067200, 1704153600, '5m') prom_remote_write_smoke{host=~'host.*'}"
warmup = 1
iterations = 2

[scenario.queries.thresholds]
max_candidate_latency_regression_pct = 100
