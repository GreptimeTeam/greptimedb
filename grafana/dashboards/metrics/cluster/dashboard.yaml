groups:
    - title: Overview
      panels:
        - title: Uptime
          type: stat
          description: The start time of GreptimeDB.
          unit: s
          queries:
            - expr: time() - process_start_time_seconds
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
        - title: Version
          type: stat
          description: GreptimeDB version.
          queries:
            - expr: SELECT pkg_version FROM information_schema.build_info
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Total Ingestion Rate
          type: stat
          description: Total ingestion rate.
          unit: rowsps
          queries:
            - expr: sum(rate(greptime_table_operator_ingest_rows[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
        - title: Total Query Rate
          type: stat
          description: Total query API call rate across MySQL, PostgreSQL, and PromQL frontends.
          unit: reqps
          queries:
            - expr: sum(rate(greptime_servers_mysql_query_elapsed_count{instance=~"$frontend"}[$__rate_interval])) + sum(rate(greptime_servers_postgres_query_elapsed_count{instance=~"$frontend"}[$__rate_interval])) + sum(rate(greptime_servers_http_promql_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: queries
        - title: User-facing Error Rate
          type: stat
          description: Server protocol errors returned by frontends. Sustained non-zero values indicate user-visible failures.
          unit: eps
          queries:
            - expr: sum(rate(greptime_servers_error{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: errors
        - title: Recent Restarts
          type: stat
          description: Process restarts over the selected time range across GreptimeDB roles.
          unit: short
          queries:
            - expr: sum(changes(process_start_time_seconds[$__range]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: restarts
        - title: Deployment
          type: stat
          description: The deployment topology of GreptimeDB.
          queries:
            - expr: SELECT count(*) as datanode FROM information_schema.cluster_info WHERE peer_type = 'DATANODE';
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT count(*) as frontend FROM information_schema.cluster_info WHERE peer_type = 'FRONTEND';
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT count(*) as metasrv FROM information_schema.cluster_info WHERE peer_type = 'METASRV';
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT count(*) as flownode FROM information_schema.cluster_info WHERE peer_type = 'FLOWNODE';
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Database Resources
          type: stat
          description: The number of the key resources in GreptimeDB.
          queries:
            - expr: SELECT COUNT(*) as databases FROM information_schema.schemata WHERE schema_name NOT IN ('greptime_private', 'information_schema')
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT COUNT(*) as tables FROM information_schema.tables WHERE table_schema != 'information_schema'
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT COUNT(region_id) as regions FROM information_schema.region_peers
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT COUNT(*) as flows FROM information_schema.flows
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Total Storage Size
          type: stat
          description: Total number of data file size.
          unit: decbytes
          queries:
            - expr: select SUM(disk_size) from information_schema.region_statistics;
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Total Rows
          type: stat
          description: Total number of data rows in the cluster. Calculated by sum of rows from each region.
          unit: sishort
          queries:
            - expr: select SUM(region_rows) from information_schema.region_statistics;
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Data Size
          type: stat
          description: The data size of wal/index/manifest in the GreptimeDB.
          unit: decbytes
          queries:
            - expr: SELECT SUM(memtable_size) * 0.42825 as WAL FROM information_schema.region_statistics;
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT SUM(index_size) as index FROM information_schema.region_statistics;
              datasource:
                type: mysql
                uid: ${information_schema}
            - expr: SELECT SUM(manifest_size) as manifest FROM information_schema.region_statistics;
              datasource:
                type: mysql
                uid: ${information_schema}
        - title: Ingestion Rate
          type: timeseries
          description: Ingestion throughput by protocol near the top of the dashboard for quick traffic context.
          unit: rowsps
          queries:
            - expr: sum(rate(greptime_table_operator_ingest_rows{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: table-operator
            - expr: sum(rate(greptime_servers_prometheus_remote_write_samples{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: prometheus-remote-write
            - expr: sum(rate(greptime_servers_http_logs_ingestion_counter{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: http-logs
            - expr: sum(rate(greptime_servers_loki_logs_ingestion_counter{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: loki-logs
            - expr: sum(rate(greptime_servers_elasticsearch_logs_docs_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: elasticsearch-docs
            - expr: sum(rate(greptime_frontend_otlp_metrics_rows{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: otlp-metrics
            - expr: sum(rate(greptime_frontend_otlp_logs_rows{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: otlp-logs
            - expr: sum(rate(greptime_frontend_otlp_traces_rows{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: otlp-traces
        - title: Query Rate
          type: timeseries
          description: Query throughput by frontend protocol near the top of the dashboard for quick traffic context.
          unit: reqps
          queries:
            - expr: sum(rate(greptime_servers_mysql_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql
            - expr: sum(rate(greptime_servers_postgres_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres
            - expr: sum(rate(greptime_servers_http_promql_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: promql
            - expr: sum(rate(greptime_servers_http_sql_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: http-sql
            - expr: sum(rate(greptime_frontend_grpc_handle_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-query
        - title: Node Availability
          type: timeseries
          description: Prometheus scrape availability by job and instance. Drops to zero indicate unavailable or uns scraped nodes.
          unit: short
          queries:
            - expr: sum by (job) (up)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{job}}'
            - expr: up
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{job}}]-[{{instance}}]-[{{pod}}]'
        - title: Request P99 and Avg
          type: timeseries
          description: Tail and average latency for HTTP and gRPC requests served by frontends. HTTP excludes health and metrics endpoints.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by (le) (rate(greptime_servers_http_requests_elapsed_bucket{instance=~"$frontend",path!~"/health|/metrics"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: http-p99
            - expr: histogram_quantile(0.99, sum by (le) (rate(greptime_servers_grpc_requests_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-p99
            - expr: sum(rate(greptime_servers_http_requests_elapsed_sum{instance=~"$frontend",path!~"/health|/metrics"}[$__rate_interval])) / sum(rate(greptime_servers_http_requests_elapsed_count{instance=~"$frontend",path!~"/health|/metrics"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: http-avg
            - expr: sum(rate(greptime_servers_grpc_requests_elapsed_sum{instance=~"$frontend"}[$__rate_interval])) / sum(rate(greptime_servers_grpc_requests_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-avg
    - title: Health
      panels:
        - title: Protocol Error Rates
          type: timeseries
          description: User-facing and protocol-level error rates. Use labels to identify whether failures are server, auth, HTTP, or gRPC related.
          unit: eps
          queries:
            - expr: sum by (protocol) (rate(greptime_servers_error{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: server-{{protocol}}
            - expr: sum by (code) (rate(greptime_servers_auth_failure_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: auth-{{code}}
            - expr: sum by (path, method, code) (rate(greptime_servers_http_requests_elapsed_count{instance=~"$frontend",path!~"/health|/metrics",code!~"2.."}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: http-{{method}}-{{path}}-{{code}}
            - expr: sum by (path, code) (rate(greptime_servers_grpc_requests_elapsed_count{instance=~"$frontend",code!~"0|OK"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-{{path}}-{{code}}
        - title: Frontend and Query Rejections
          type: timeseries
          description: Request and query memory rejections. Non-zero values indicate requests are being rejected before or during execution.
          unit: rps
          queries:
            - expr: sum(rate(greptime_servers_request_memory_rejected_total{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: request-memory
            - expr: sum(rate(greptime_query_memory_pool_rejected_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: query-memory
        - title: Datanode Write Failures
          type: timeseries
          description: Region request failures and failed inserts on datanodes. These indicate backend write-path errors after routing.
          unit: eps
          queries:
            - expr: sum by (instance, pod) (rate(greptime_datanode_region_request_fail_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: region-request-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (rate(greptime_datanode_region_failed_insert_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: failed-insert-[{{instance}}]-[{{pod}}]
        - title: Buffered Ingestion Loss
          type: timeseries
          description: Pending-row flush failures and dropped rows. Sustained non-zero dropped rows are a data-loss signal.
          unit: eps
          queries:
            - expr: sum(rate(greptime_pending_rows_flush_failures{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: flush-failures
            - expr: sum(rate(greptime_pending_rows_flush_dropped_rows{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: dropped-rows
        - title: Mito Backpressure and Failures
          type: timeseries
          description: Storage-engine write rejects, write stalls, flush/compaction failures, scan memory pressure, and GC errors on datanodes.
          unit: eps
          queries:
            - expr: sum(rate(greptime_mito_write_reject_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: write-reject
            - expr: sum(rate(greptime_mito_write_stall_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: write-stall
            - expr: sum(rate(greptime_mito_flush_failure_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: flush-failure
            - expr: sum(rate(greptime_mito_compaction_failure_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-failure
            - expr: sum(rate(greptime_mito_scan_requests_rejected_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: scan-rejected
            - expr: sum(rate(greptime_mito_gc_errors_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: gc-errors
        - title: Scan and Compaction Memory Rejects
          type: timeseries
          description: Datanode scan and compaction memory rejection/exhaustion counters.
          unit: rps
          queries:
            - expr: sum(rate(greptime_mito_scan_requests_rejected_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: scan-rejected
            - expr: sum(rate(greptime_mito_scan_memory_exhausted_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: scan-exhausted
            - expr: sum(rate(greptime_mito_compaction_memory_rejected_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-rejected
        - title: OpenDAL Errors
          type: timeseries
          description: Object-store errors by scheme, operation, and error, excluding NotFound noise.
          unit: eps
          queries:
            - expr: sum by (scheme, operation, error) (rate(opendal_operation_errors_total{instance=~"$datanode",error!="NotFound"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{scheme}}-{{operation}}-{{error}}'
        - title: Metasrv Failures
          type: timeseries
          description: Region migration and reconciliation failures in metasrv.
          unit: eps
          queries:
            - expr: sum(rate(greptime_meta_region_migration_fail[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: migration-fail
            - expr: sum(rate(greptime_meta_reconciliation_procedure_error[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: reconciliation-error
        - title: Flow and Trigger Failures
          type: timeseries
          description: Derived-data and alerting pipeline failures.
          unit: eps
          queries:
            - expr: sum by (code) (rate(greptime_flow_errors[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: flow-{{code}}
            - expr: sum(rate(greptime_trigger_evaluate_failure_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: trigger-evaluate
            - expr: sum(rate(greptime_trigger_send_alert_failure_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: trigger-send-alert
            - expr: sum(rate(greptime_trigger_save_alert_record_failure_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: trigger-save-alert
        - title: Mito GC Failures
          type: timeseries
          description: Mito garbage-collection errors and skipped/orphaned files on datanodes.
          unit: short
          queries:
            - expr: sum(rate(greptime_mito_gc_errors_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: gc-errors
            - expr: sum(rate(greptime_mito_gc_orphaned_index_files{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: orphaned-index-files
            - expr: sum(rate(greptime_mito_gc_skipped_unparsable_files{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: skipped-unparsable
        - title: Mito GC Duration
          type: timeseries
          description: P99 and average Mito garbage-collection duration by stage.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by (le, stage) (rate(greptime_mito_gc_duration_seconds_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{stage}}-p99'
            - expr: sum by (stage) (rate(greptime_mito_gc_duration_seconds_sum{instance=~"$datanode"}[$__rate_interval])) / sum by (stage) (rate(greptime_mito_gc_duration_seconds_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{stage}}-avg'
    - title: Capacity
      panels:
        - title: Runtime Threads
          type: timeseries
          description: Runtime thread pool size and idle threads by instance. Low idle threads during latency spikes can indicate executor saturation.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_runtime_threads_alive)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: alive-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_runtime_threads_idle)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: idle-[{{instance}}]-[{{pod}}]
        - title: Request Memory Utilization
          type: timeseries
          description: Frontend request memory usage divided by configured request memory limit.
          unit: percentunit
          queries:
            - expr: sum by (instance, pod) (greptime_servers_request_memory_in_use_bytes{instance=~"$frontend"}) / sum by (instance, pod) (greptime_servers_request_memory_limit_bytes{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Query Memory Usage
          type: timeseries
          description: Query memory pool usage. Use this with query memory rejection panels to diagnose query saturation.
          unit: bytes
          queries:
            - expr: sum by (instance, pod) (greptime_query_memory_pool_usage_bytes)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Scan and Compaction Memory
          type: timeseries
          description: Datanode scan memory usage and compaction memory utilization.
          unit: bytes
          queries:
            - expr: sum by (instance, pod) (greptime_mito_scan_memory_usage_bytes{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: scan-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_mito_compaction_memory_in_use_bytes{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-used-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_mito_compaction_memory_limit_bytes{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-limit-[{{instance}}]-[{{pod}}]
        - title: Write Buffer and Active Stalling
          type: timeseries
          description: Mito write buffer bytes and active write-stalling gauges. Growth here indicates write-path backpressure.
          unit: bytes
          queries:
            - expr: sum by (instance, pod) (greptime_mito_write_buffer_bytes{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: buffer-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_mito_write_stalling_count{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: stalling-[{{instance}}]-[{{pod}}]
        - title: Prom Store Backlog
          type: timeseries
          description: Prometheus remote-write pending rows, batches, and workers. Rising pending rows indicate remote-write buffering backlog.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_prom_store_pending_rows{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: rows-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_prom_store_pending_batches{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: batches-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_prom_store_pending_workers{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: workers-[{{instance}}]-[{{pod}}]
        - title: Inflight Flush and Compaction
          type: timeseries
          description: Current in-flight flush and compaction tasks on datanodes.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_mito_inflight_flush_count{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: flush-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_mito_inflight_compaction_count{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-[{{instance}}]-[{{pod}}]
    - title: Resources
      panels:
        - title: Datanode Memory per Instance
          type: timeseries
          description: Current memory usage by instance
          unit: bytes
          queries:
            - expr: sum(process_resident_memory_bytes{instance=~"$datanode"}) by (instance, pod)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{ pod }}]'
            - expr: max(greptime_memory_limit_in_bytes{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: limit
        - title: Datanode CPU Usage per Instance
          type: timeseries
          description: Current cpu usage by instance
          unit: none
          queries:
            - expr: sum(rate(process_cpu_seconds_total{instance=~"$datanode"}[$__rate_interval]) * 1000) by (instance, pod)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{ instance }}]-[{{ pod }}]'
            - expr: max(greptime_cpu_limit_in_millicores{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: limit
        - title: Frontend Memory per Instance
          type: timeseries
          description: Current memory usage by instance
          unit: bytes
          queries:
            - expr: sum(process_resident_memory_bytes{instance=~"$frontend"}) by (instance, pod)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{ instance }}]-[{{ pod }}]'
            - expr: max(greptime_memory_limit_in_bytes{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: limit
        - title: Frontend CPU Usage per Instance
          type: timeseries
          description: Current cpu usage by instance
          unit: none
          queries:
            - expr: sum(rate(process_cpu_seconds_total{instance=~"$frontend"}[$__rate_interval]) * 1000) by (instance, pod)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{ instance }}]-[{{ pod }}]-cpu'
            - expr: max(greptime_cpu_limit_in_millicores{instance=~"$frontend"})
