          description: Flow Operation Latency.
          queries:
            - expr: histogram_quantile(0.95, sum(rate(greptime_flow_processing_time_bucket[$__rate_interval])) by (le,instance,pod,type))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-p95'
            - expr: histogram_quantile(0.99, sum(rate(greptime_flow_processing_time_bucket[$__rate_interval])) by (le,instance,pod,type))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-p99'
        - title: Flow Buffer Size per Instance
          type: timeseries
          description: Flow Buffer Size per Instance.
          queries:
            - expr: greptime_flow_input_buf_size
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Flow Processing Error per Instance
          type: timeseries
          description: Flow Processing Error per Instance.
          queries:
            - expr: sum by(instance,pod,code) (rate(greptime_flow_errors[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{code}}]'
    - title: Trigger
      panels:
        - title: Trigger Count
          type: timeseries
          description: Total number of triggers currently defined.
          queries:
            - expr: greptime_trigger_count{}
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
        - title: Trigger Eval Elapsed
          type: timeseries
          description: Elapsed time for trigger evaluation, including query execution and condition evaluation.
          unit: s
          queries:
            - expr: "histogram_quantile(0.99, \n  rate(greptime_trigger_evaluate_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-p99'
            - expr: "histogram_quantile(0.75, \n  rate(greptime_trigger_evaluate_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-p75'
            - expr: sum(rate(greptime_trigger_evaluate_elapsed_sum[$__rate_interval])) / sum(rate(greptime_trigger_evaluate_elapsed_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: avg
        - title: Trigger Eval Failure Rate
          type: timeseries
          description: Rate of failed trigger evaluations.
          unit: none
          queries:
            - expr: rate(greptime_trigger_evaluate_failure_count[$__rate_interval])
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
        - title: Send Alert Elapsed
          type: timeseries
          description: Elapsed time to send trigger alerts to notification channels.
          unit: s
          queries:
            - expr: "histogram_quantile(0.99, \n  rate(greptime_trigger_send_alert_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{channel_type}}]-p99'
            - expr: "histogram_quantile(0.75, \n  rate(greptime_trigger_send_alert_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{channel_type}}]-p75'
            - expr: sum(rate(greptime_trigger_send_alert_elapsed_sum[$__rate_interval])) / sum(rate(greptime_trigger_send_alert_elapsed_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: avg
        - title: Send Alert Failure Rate
          type: timeseries
          description: Rate of failures when sending trigger alerts.
          unit: none
          queries:
            - expr: rate(greptime_trigger_send_alert_failure_count[$__rate_interval])
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
        - title: Save Alert Elapsed
          type: timeseries
          description: Elapsed time to persist trigger alert records.
          unit: s
          queries:
            - expr: "histogram_quantile(0.99, \n  rate(greptime_trigger_save_alert_record_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{storage_type}}]-p99'
            - expr: "histogram_quantile(0.75, \n  rate(greptime_trigger_save_alert_record_elapsed_bucket[$__rate_interval])\n)"
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{storage_type}}]-p75'
            - expr: sum(rate(greptime_trigger_save_alert_record_elapsed_sum[$__rate_interval])) / sum(rate(greptime_trigger_save_alert_record_elapsed_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: avg
        - title: Save Alert Failure Rate
          type: timeseries
          description: Rate of failures when persisting trigger alert records.
          unit: none
          queries:
            - expr: rate(greptime_trigger_save_alert_record_failure_count[$__rate_interval])
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: __auto
