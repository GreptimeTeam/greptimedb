          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le, request_type) (rate(greptime_grpc_region_request_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{request_type}}]'
            - expr: sum by(instance, pod, request_type) (rate(greptime_grpc_region_request_sum{instance=~"$frontend"}[$__rate_interval])) / sum by(instance, pod, request_type) (rate(greptime_grpc_region_request_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{request_type}}]-avg'
        - title: 'Frontend Handle Bulk Insert Elapsed Time '
          type: timeseries
          description: Per-stage time for frontend to handle bulk insert requests
          unit: s
          queries:
            - expr: sum by(instance, pod, stage) (rate(greptime_table_operator_handle_bulk_insert_sum[$__rate_interval]))/sum by(instance, pod, stage) (rate(greptime_table_operator_handle_bulk_insert_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-AVG'
            - expr: histogram_quantile(0.99, sum by(instance, pod, stage, le) (rate(greptime_table_operator_handle_bulk_insert_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-P95'
    - title: Datanode
      panels:
        - title: Region Request Failures and Failed Inserts
          type: timeseries
          description: Datanode region request failures and failed inserts by instance.
          unit: eps
          queries:
            - expr: sum by (instance, pod) (rate(greptime_datanode_region_request_fail_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: request-fail-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (rate(greptime_datanode_region_failed_insert_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: failed-insert-[{{instance}}]-[{{pod}}]
        - title: Write Rejects and Stalls
          type: timeseries
          description: Mito write rejects, write stall events, and active write stalling by datanode.
          unit: short
          queries:
            - expr: sum by (instance, pod) (rate(greptime_mito_write_reject_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: reject-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (rate(greptime_mito_write_stall_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: stall-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_mito_write_stalling_count{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: active-stalling-[{{instance}}]-[{{pod}}]
        - title: Flush and Compaction Failures
          type: timeseries
          description: Mito flush and compaction failure rates by datanode.
          unit: eps
          queries:
            - expr: sum by (instance, pod) (rate(greptime_mito_flush_failure_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: flush-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (rate(greptime_mito_compaction_failure_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: compaction-[{{instance}}]-[{{pod}}]
        - title: Mito GC Health
          type: timeseries
          description: Mito garbage-collection runs, errors, deleted files, orphaned index files, skipped unparsable files, and duration.
          unit: short
          queries:
            - expr: sum(rate(greptime_mito_gc_runs_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: runs
            - expr: sum(rate(greptime_mito_gc_errors_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: errors
            - expr: sum(rate(greptime_mito_gc_files_deleted_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: files-deleted
            - expr: sum(greptime_mito_gc_orphaned_index_files{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: orphaned-index-files
            - expr: sum(greptime_mito_gc_skipped_unparsable_files{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: skipped-unparsable
            - expr: histogram_quantile(0.99, sum by (le, stage) (rate(greptime_mito_gc_duration_seconds_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{stage}}-p99'
            - expr: sum by (stage) (rate(greptime_mito_gc_duration_seconds_sum{instance=~"$datanode"}[$__rate_interval])) / sum by (stage) (rate(greptime_mito_gc_duration_seconds_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{stage}}-avg'
    - title: Storage
      panels:
        - title: Request OPS per Instance
          type: timeseries
          description: Request QPS per Instance.
          unit: ops
          queries:
            - expr: sum by(instance, pod, type) (rate(greptime_mito_handle_request_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]'
        - title: Request P99 and Avg per Instance
          type: timeseries
          description: Request P99 and average per Instance.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le, type) (rate(greptime_mito_handle_request_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]'
            - expr: sum by(instance, pod, type) (rate(greptime_mito_handle_request_elapsed_sum{instance=~"$datanode"}[$__rate_interval])) / sum by(instance, pod, type) (rate(greptime_mito_handle_request_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-avg'
        - title: Write Buffer per Instance
          type: timeseries
          description: Write Buffer per Instance.
          unit: decbytes
          queries:
            - expr: greptime_mito_write_buffer_bytes{instance=~"$datanode"}
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Write Rows per Instance
          type: timeseries
          description: Ingestion size by row counts.
          unit: rowsps
          queries:
            - expr: sum by (instance, pod) (rate(greptime_mito_write_rows_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Flush OPS per Instance
          type: timeseries
          description: Flush QPS per Instance.
          unit: ops
          queries:
            - expr: sum by(instance, pod, reason) (rate(greptime_mito_flush_requests_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{reason}}]'
        - title: Flush Elapsed Time
          type: timeseries
          description: Mito flush p95 and p99 elapsed time by datanode and flush type. Use this to identify slow flush jobs.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by (instance, pod, le, type) (rate(greptime_mito_flush_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-p95'
            - expr: histogram_quantile(0.99, sum by (instance, pod, le, type) (rate(greptime_mito_flush_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-p99'
            - expr: sum by (instance, pod, type) (rate(greptime_mito_flush_elapsed_sum{instance=~"$datanode"}[$__rate_interval])) / sum by (instance, pod, type) (rate(greptime_mito_flush_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]-avg'
        - title: Flush Throughput
          type: timeseries
          description: Mito flushed bytes and flushed file rates. Use this with flush elapsed time to distinguish slow jobs from large jobs.
          unit: bytes
          queries:
            - expr: sum by (instance, pod) (rate(greptime_mito_flush_bytes_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-bytes'
            - expr: sum by (instance, pod) (rate(greptime_mito_flush_file_total{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-files'
        - title: Write Stall per Instance
          type: timeseries
          description: Write Stall per Instance.
          queries:
            - expr: sum by(instance, pod) (greptime_mito_write_stall_total{instance=~"$datanode"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Read Stage OPS per Instance
          type: timeseries
          description: Read Stage OPS per Instance.
          unit: ops
          queries:
            - expr: sum by(instance, pod) (rate(greptime_mito_read_stage_elapsed_count{instance=~"$datanode", stage="total"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Read Stage P99 and Avg per Instance
          type: timeseries
          description: Read Stage P99 and average per Instance.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le, stage) (rate(greptime_mito_read_stage_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]'
            - expr: sum by(instance, pod, stage) (rate(greptime_mito_read_stage_elapsed_sum{instance=~"$datanode"}[$__rate_interval])) / sum by(instance, pod, stage) (rate(greptime_mito_read_stage_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-avg'
        - title: Write Stage P99 and Avg per Instance
          type: timeseries
          description: Write Stage P99 and average per Instance.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le, stage) (rate(greptime_mito_write_stage_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]'
            - expr: sum by(instance, pod, stage) (rate(greptime_mito_write_stage_elapsed_sum{instance=~"$datanode"}[$__rate_interval])) / sum by(instance, pod, stage) (rate(greptime_mito_write_stage_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-avg'
        - title: Compaction OPS per Instance
          type: timeseries
          description: Compaction OPS per Instance.
          unit: ops
          queries:
            - expr: sum by(instance, pod) (rate(greptime_mito_compaction_total_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{ instance }}]-[{{pod}}]'
        - title: Compaction Elapsed Time per Instance by Stage
          type: timeseries
          description: Compaction latency by stage
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le, stage) (rate(greptime_mito_compaction_stage_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-p99'
            - expr: sum by(instance, pod, stage) (rate(greptime_mito_compaction_stage_elapsed_sum{instance=~"$datanode"}[$__rate_interval]))/sum by(instance, pod, stage) (rate(greptime_mito_compaction_stage_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-avg'
        - title: Compaction P99 and Avg per Instance
          type: timeseries
          description: Compaction P99 and average per Instance.
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(instance, pod, le,stage) (rate(greptime_mito_compaction_total_elapsed_bucket{instance=~"$datanode"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-compaction'
            - expr: sum by(instance, pod) (rate(greptime_mito_compaction_total_elapsed_sum{instance=~"$datanode"}[$__rate_interval])) / sum by(instance, pod) (rate(greptime_mito_compaction_total_elapsed_count{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-avg'
        - title: WAL write size
          type: timeseries
          description: Write-ahead logs write size as bytes. This chart includes stats of p95 and p99 size by instance, total WAL write rate.
          unit: bytes
          queries:
            - expr: histogram_quantile(0.95, sum by(le,instance, pod) (rate(raft_engine_write_size_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-req-size-p95'
            - expr: histogram_quantile(0.99, sum by(le,instance,pod) (rate(raft_engine_write_size_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-req-size-p99'
            - expr: sum by (instance, pod)(rate(raft_engine_write_size_sum[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-throughput'
        - title: Cached Bytes per Instance
          type: timeseries
          description: Cached Bytes per Instance.
          unit: decbytes
          queries:
            - expr: greptime_mito_cache_bytes{instance=~"$datanode"}
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]'
        - title: Inflight Compaction
          type: timeseries
          description: Ongoing compaction task count
          unit: none
          queries:
            - expr: greptime_mito_inflight_compaction_count
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: WAL sync duration seconds
          type: timeseries
          description: Raft engine (local disk) log store sync latency, p99
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(le, type, node, instance, pod) (rate(raft_engine_sync_log_duration_seconds_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-p99'
        - title: Log Store op duration seconds
          type: timeseries
          description: Write-ahead log operations latency at p99
          unit: s
          queries:
            - expr: histogram_quantile(0.99, sum by(le,logstore,optype,instance, pod) (rate(greptime_logstore_op_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{logstore}}]-[{{optype}}]-p99'
        - title: Inflight Flush
          type: timeseries
          description: Ongoing flush task count
          unit: none
          queries:
            - expr: greptime_mito_inflight_flush_count
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Compaction Input/Output Bytes
          type: timeseries
          description: Compaction oinput output bytes
          unit: bytes
          queries:
            - expr: sum by(instance, pod) (greptime_mito_compaction_input_bytes)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-input'
            - expr: sum by(instance, pod) (greptime_mito_compaction_output_bytes)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-output'
        - title: Region Worker Handle Bulk Insert Requests
          type: timeseries
          description: Per-stage elapsed time for region worker to handle bulk insert region requests.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by(le,instance, stage, pod) (rate(greptime_region_worker_handle_write_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-P95'
            - expr: sum by(instance, stage, pod) (rate(greptime_region_worker_handle_write_sum[$__rate_interval]))/sum by(instance, stage, pod) (rate(greptime_region_worker_handle_write_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-AVG'
        - title: Active Series and Field Builders Count
          type: timeseries
          description: Compaction oinput output bytes
          unit: none
          queries:
            - expr: sum by(instance, pod) (greptime_mito_memtable_active_series_count)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-series'
            - expr: sum by(instance, pod) (greptime_mito_memtable_field_builder_count)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-field_builders'
        - title: Region Worker Convert Requests
          type: timeseries
          description: Per-stage elapsed time for region worker to decode requests.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by(le, instance, stage, pod) (rate(greptime_datanode_convert_region_request_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-P95'
            - expr: sum by(le,instance, stage, pod) (rate(greptime_datanode_convert_region_request_sum[$__rate_interval]))/sum by(le,instance, stage, pod) (rate(greptime_datanode_convert_region_request_count[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{stage}}]-AVG'
        - title: Cache Miss
          type: timeseries
          description: The local cache miss of the datanode.
          queries:
            - expr: sum by (instance,pod, type) (rate(greptime_mito_cache_miss{instance=~"$datanode"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]-[{{type}}]'
    - title: Index
      panels:
        - title: Index Apply Elapsed Time
          type: timeseries
          description: Index apply p95 and p99 elapsed time by index type. Slow apply can increase read latency for indexed predicates.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by (le, type) (rate(greptime_index_apply_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-p95'
            - expr: histogram_quantile(0.99, sum by (le, type) (rate(greptime_index_apply_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-p99'
        - title: Index Create Elapsed Time
          type: timeseries
          description: Index create p95 and p99 elapsed time by stage and index type. Slow stages can explain flush or compaction delays.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by (le, stage, type) (rate(greptime_index_create_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-{{stage}}-p95'
            - expr: histogram_quantile(0.99, sum by (le, stage, type) (rate(greptime_index_create_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-{{stage}}-p99'
        - title: Index Create Rows and Bytes
          type: timeseries
          description: Rows and bytes produced by index creation by index type. Spikes here can explain storage write pressure.
          unit: short
          queries:
            - expr: sum by (type) (rate(greptime_index_create_rows_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-rows'
            - expr: sum by (type) (rate(greptime_index_create_bytes_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-bytes'
        - title: Index Memory Usage
          type: timeseries
          description: Memory used while applying and creating indexes. Growth here can explain memory pressure during indexed flush or compaction work.
          unit: bytes
          queries:
            - expr: greptime_index_apply_memory_usage
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: apply
            - expr: sum by (type) (greptime_index_create_memory_usage)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: create-{{type}}
        - title: Index IO Bytes
          type: timeseries
          description: Index read and write byte rates by operation and file type for puffin and intermediate files.
          unit: bytes
          queries:
            - expr: sum by (type, file_type) (rate(greptime_index_io_bytes_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-{{file_type}}'
        - title: Index IO Operations
          type: timeseries
          description: Index IO operation rates by operation and file type, including read, write, seek, and flush operations.
          unit: ops
          queries:
            - expr: sum by (type, file_type) (rate(greptime_index_io_op_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '{{type}}-{{file_type}}'
        - title: Index Cache
          type: timeseries
          description: Index-related cache hits, misses, and evictions from Mito caches.
          unit: ops
          queries:
            - expr: sum by (type) (rate(greptime_mito_cache_hit{type=~"index.*|vector_index|index_result"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: hit-{{type}}
            - expr: sum by (type) (rate(greptime_mito_cache_miss{type=~"index.*|vector_index|index_result"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: miss-{{type}}
            - expr: sum by (type, cause) (rate(greptime_mito_cache_eviction{type=~"index.*|vector_index|index_result"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: evict-{{type}}-{{cause}}
    - title: Metasrv
      panels:
        - title: Inactive and Lease-expired Regions
          type: timeseries
          description: Inactive regions and expired region leases. Non-zero values indicate metasrv or routing health issues.
          unit: short
          queries:
            - expr: sum(greptime_meta_inactive_regions)
