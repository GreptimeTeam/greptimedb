              legendFormat: http-sql
            - expr: sum(rate(greptime_frontend_grpc_handle_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-query
        - title: Query Latency by Protocol
          type: timeseries
          description: p95, p99, and average query latency by main frontend protocol.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by (le) (rate(greptime_servers_mysql_query_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql-p95
            - expr: histogram_quantile(0.99, sum by (le) (rate(greptime_servers_mysql_query_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql-p99
            - expr: histogram_quantile(0.95, sum by (le) (rate(greptime_servers_postgres_query_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres-p95
            - expr: histogram_quantile(0.99, sum by (le) (rate(greptime_servers_postgres_query_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres-p99
            - expr: histogram_quantile(0.95, sum by (le) (rate(greptime_servers_http_promql_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: promql-p95
            - expr: histogram_quantile(0.99, sum by (le) (rate(greptime_servers_http_promql_elapsed_bucket{instance=~"$frontend"}[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: promql-p99
            - expr: sum(rate(greptime_servers_mysql_query_elapsed_sum{instance=~"$frontend"}[$__rate_interval])) / sum(rate(greptime_servers_mysql_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql-avg
            - expr: sum(rate(greptime_servers_postgres_query_elapsed_sum{instance=~"$frontend"}[$__rate_interval])) / sum(rate(greptime_servers_postgres_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres-avg
            - expr: sum(rate(greptime_servers_http_promql_elapsed_sum{instance=~"$frontend"}[$__rate_interval])) / sum(rate(greptime_servers_http_promql_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: promql-avg
            - expr: sum(rate(greptime_frontend_grpc_handle_query_elapsed_sum{instance=~"$frontend"}[$__rate_interval])) / sum(rate(greptime_frontend_grpc_handle_query_elapsed_count{instance=~"$frontend"}[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: grpc-query-avg
        - title: Query Stage Latency
          type: timeseries
          description: p95 and p99 latency by query stage. Use stage labels to identify planning, scan, or merge bottlenecks.
          unit: s
          queries:
            - expr: histogram_quantile(0.95, sum by (le, stage) (rate(greptime_query_stage_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: p95-{{stage}}
            - expr: histogram_quantile(0.99, sum by (le, stage) (rate(greptime_query_stage_elapsed_bucket[$__rate_interval])))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: p99-{{stage}}
        - title: Merge Scan Fan-out and Errors
          type: timeseries
          description: Merge-scan region fan-out and errors. High fan-out can explain slow distributed table scans.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_query_merge_scan_regions)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: regions-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (rate(greptime_query_merge_scan_errors_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: errors-[{{instance}}]-[{{pod}}]
        - title: Pushdown Fallback Errors
          type: timeseries
          description: Failed query pushdown fallback attempts. Non-zero values can indicate optimization paths that increase scan work.
          unit: eps
          queries:
            - expr: sum(rate(greptime_push_down_fallback_errors_total[$__rate_interval]))
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: pushdown-fallback-errors
        - title: PromQL Series Count
          type: timeseries
          description: Series count touched by PromQL queries. Correlate this with PromQL latency to identify cardinality-driven slowness.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_promql_series_count)
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: '[{{instance}}]-[{{pod}}]'
        - title: Connections and Prepared Statements
          type: timeseries
          description: MySQL/PostgreSQL connection and prepared-statement counts. Spikes can indicate client storms or leaks.
          unit: short
          queries:
            - expr: sum by (instance, pod) (greptime_servers_mysql_connection_count{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql-connections-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_servers_postgres_connection_count{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres-connections-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_servers_mysql_prepared_count{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: mysql-prepared-[{{instance}}]-[{{pod}}]
            - expr: sum by (instance, pod) (greptime_servers_postgres_prepared_count{instance=~"$frontend"})
              datasource:
                type: prometheus
                uid: ${metrics}
              legendFormat: postgres-prepared-[{{instance}}]-[{{pod}}]
    - title: Frontend Requests
      panels:
        - title: HTTP QPS per Instance
